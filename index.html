<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Detalle de VicPersi</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.1.2/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css?family=Fredericka+the+Great|Lovers+Quarrel" rel="stylesheet">
  <style>
    /* Fondo general con más saturación */
    body {
      background-color: #ffecf9;
      margin: 0;
      overflow: hidden;
      font-family: 'Lovers Quarrel', cursive;
      animation: beat-back 0.8s infinite alternate;
      user-select: none;
    }

    @keyframes beat-back {
      0% { background-color: #ffecf9; }
      100% { background-color: #ffb6d9; }
    }
    
    /* --- CONTENIDO PRINCIPAL --- */
    .back {
      text-align: center;
      padding-top: 60px;
    }

    .topic {
      margin: 10px 0;
      font-family: 'Fredericka the Great', cursive;
      font-size: 3.4rem;
      color: #d6006f;
      text-shadow: 3px 3px 6px rgba(230, 0, 115, 0.6);
      letter-spacing: 1.5px;
      animation: pulse 1.5s infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.05); }
    }

    .content-1,
    .content-2 {
      font-family: 'Lovers Quarrel', cursive;
      font-size: 2.5rem;
      margin: 22px 0;
      color: #c4005b;
      text-shadow: 2px 2px 5px rgba(255, 105, 180, 0.5);
    }

    .footer {
      margin: 65px 0 12px;
      font-family: 'Fredericka the Great', cursive;
      font-size: 3rem;
      color: #d6006f;
      text-shadow: 3px 3px 8px rgba(230, 0, 115, 0.7);
    }

    .love-box {
      display: inline-block;
      max-width: 520px;
      width: 88%;
      margin: 25px auto;
      padding: 25px;
      background: linear-gradient(145deg, #fff0f6, #ffd6eb);
      border: 4px solid #e60073;
      border-radius: 30px;
      box-shadow: 0 10px 25px rgba(230, 0, 115, 0.35);
      font-family: 'Lovers Quarrel', cursive;
      font-size: 1.6rem;
      color: #99004d;
      text-align: center;
      line-height: 1.7;
      position: relative;
      z-index: 2;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 10px 25px rgba(230, 0, 115, 0.35); }
      to { box-shadow: 0 10px 35px rgba(230, 0, 115, 0.6); }
    }

    .love-box::before {
      content: "💬";
      position: absolute;
      top: -18px;
      left: 15px;
      font-size: 1.8rem;
    }

    .love-box::after {
      content: "💌";
      position: absolute;
      top: -18px;
      right: 15px;
      font-size: 1.8rem;
    }

    /* Corazón principal */
    .heart {
      margin: 35px auto;
      background-color: #ff3399;
      height: 110px;
      width: 110px;
      transform: rotate(-45deg);
      animation: beat 0.7s infinite alternate;
      border-radius: 6px;
      box-shadow: 0 0 25px rgba(255, 51, 153, 0.8);
    }

    .heart:after, .heart:before {
      content: "";
      position: absolute;
      width: 110px;
      height: 110px;
      background: #ff3399;
      border-radius: 50%;
      z-index: -1;
    }

    .heart:before { top: -55px; left: 0; }
    .heart:after { top: 0; left: 55px; }

    .heart:hover {
      transform: scale(1.35) rotate(-45deg);
      box-shadow: 0 0 35px rgba(255, 51, 153, 0.9);
    }

    @keyframes beat {
      0% { transform: scale(1) rotate(-45deg); }
      100% { transform: scale(0.85) rotate(-45deg); }
    }

    /* --- LLUVIA DE PALABRAS --- */
    .falling-word {
      position: absolute;
      top: -50px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.95;
      font-weight: bold;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
      animation: fall linear forwards;
    }

    @keyframes fall {
      0% { transform: translateY(-50px); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(110vh); opacity: 0; }
    }

    /* --- EXPLOSIONES DE CORAZONES --- */
    .heart-explosion {
      position: absolute;
      pointer-events: none;
      font-size: 20px;
      z-index: 100;
    }

    /* --- CRÉDITOS: más centrado y más pequeño --- */
    .credits-container {
      text-align: center;
      margin-top: 40px;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .credits-box {
      display: inline-block;
      background: linear-gradient(45deg, #ffe6f2, #ffccdd);
      padding: 8px 16px;
      border-radius: 18px;
      border: 2px solid #e60073;
      box-shadow: 0 3px 10px rgba(230, 0, 115, 0.3);
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 0.95rem;
      color: #99004d;
      font-weight: bold;
      letter-spacing: 0.5px;
      animation: float 1.5s ease-in-out infinite alternate;
    }

    @keyframes float {
      0% { transform: translateY(0) scale(1); opacity: 0.9; }
      100% { transform: translateY(-5px) scale(1.02); opacity: 1; }
    }

    .credits-box::before, .credits-box::after {
      content: "✨";
      margin: 0 5px;
      font-size: 0.9em;
    }
  </style>
</head>
<body>

  <div id="mainContent">
    <a href="" target="_blank" class="menu-toggle" title="Escríbeme en WhatsApp">
      <span></span>
      <span></span>
      <span></span>
    </a>

    <div class="back text-center">
      <h1 class="topic">PARA ♥️<br> De Vic Persi</h1>
      <p class="content-1"> Un pequeño Presente De Vic_Persi</p>
      <p class="content-2">Programador y diseñador grafico Vic_Persi </p>  
      <div class="heart"></div>
      <p class="footer">De cada caída se aprende,es un aprendizaje, y se crece<br>♥️</p>
      <div class="love-box" id="loveMessage"></div>
    </div>

    <div class="credits-container">
      <div class="credits-box">
        by Vic_Persi
      </div>
    </div>
  </div>

  <script>
    // Mensaje de amor
    const longMessage = `Hoy es un buen día para sonreír y agradecer", "La felicidad es una elección", "Sé la luz que quieres ver en el mundo", "Vive simple, sueña en grande", "Tu actitud define tu día", "No esperes a que sea perfecto, empieza ahora", y "La vida es un viaje, no una carrera🌌`;
    const loveMessageElement = document.getElementById("loveMessage");

    function typeWriter() {
      let i = 0;
      const timer = setInterval(() => {
        if (i < longMessage.length) {
          loveMessageElement.innerHTML += longMessage.charAt(i);
          i++;
        } else {
          clearInterval(timer);
        }
      }, 30);
    }

    // Lluvia de palabras románticas
    function startFallingWords() {
      const words = ['我愛你', '我喜歡你', 'Corazón', 'Alma', '我想你', 'extrañar', 'cinceridad', 'Amistad', 'Sueños', 'Verdad', 'Magia', '維克·珀西'];
      const colors = ['#d6006f', '#ff3399', '#e60073', '#ff0080', '#cc0066'];

      setInterval(() => {
        const word = document.createElement('div');
        word.classList.add('falling-word');
        word.innerText = words[Math.floor(Math.random() * words.length)];
        word.style.left = Math.random() * 90 + 5 + 'vw';
        word.style.fontSize = (Math.random() * 25 + 22) + 'px';
        word.style.color = colors[Math.floor(Math.random() * colors.length)];
        word.style.fontFamily = "'Lovers Quarrel', cursive";
        word.style.animationDuration = (Math.random() * 6 + 4) + 's';
        document.body.appendChild(word);
        setTimeout(() => word.remove(), 7000);
      }, 450);
    }

    // Explosión de corazones al tocar
    document.body.addEventListener('click', function(e) {
      createHeartExplosion(e.clientX, e.clientY);
    });

    document.body.addEventListener('touchstart', function(e) {
      for (let i = 0; i < e.touches.length; i++) {
        const touch = e.touches[i];
        createHeartExplosion(touch.clientX, touch.clientY);
      }
    });

    function createHeartExplosion(x, y) {
      const hearts = ['V', '💕', '💖', '💗', '💘', '💓', '💝', '💞', '🧡', '💛', '🖤', '🥰'];
      for (let i = 0; i < 18; i++) {
        const heart = document.createElement('div');
        heart.classList.add('heart-explosion');
        heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
        heart.style.left = x + 'px';
        heart.style.top = y + 'px';
        heart.style.position = 'absolute';
        heart.style.transform = 'translate(-50%, -50%)';
        
        const angle = Math.random() * 360;
        const r = Math.random() * 120 + 60;
        const tx = r * Math.cos(angle * Math.PI / 180);
        const ty = r * Math.sin(angle * Math.PI / 180);

        heart.style.transition = 'transform 0.9s ease-out, opacity 0.9s ease';
        document.body.appendChild(heart);

        setTimeout(() => {
          heart.style.transform = `translate(-50%, -50%) translate(${tx}px, ${ty}px) rotate(${angle}deg)`;
          heart.style.opacity = 0;
        }, 10);

        setTimeout(() => heart.remove(), 900);
      }
    }
    
    // Inicia las funciones principales al cargar la página
    window.addEventListener("load", function () {
      typeWriter();
      startFallingWords();
    });
  </script>

</body>
</html>
  </head>

 document.addEventListener('click', function() {

</body>
</html>
